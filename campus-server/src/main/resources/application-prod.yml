# 生产环境配置 — 所有敏感信息通过环境变量注入
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

jwt:
  secret: ${JWT_SECRET}
  expiration: 604800000

campus:
  upload:
    path: ${UPLOAD_PATH:/data/uploads}
