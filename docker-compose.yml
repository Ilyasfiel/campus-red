version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: campus-red-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-campus_red_2024}
      MYSQL_DATABASE: campus_red
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./campus-server/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./campus-server/src/main/resources/message-schema.sql:/docker-entrypoint-initdb.d/02-message-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./campus-server
    container_name: campus-red-server
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/campus_red?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-campus_red_2024}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      UPLOAD_PATH: /data/uploads
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - uploads_data:/data/uploads

volumes:
  mysql_data:
  uploads_data:
