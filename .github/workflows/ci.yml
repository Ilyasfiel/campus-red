name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: campus_red
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test -B
        working-directory: campus-server
        env:
          DB_URL: jdbc:mysql://127.0.0.1:3306/campus_red?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
          DB_USERNAME: root
          DB_PASSWORD: test_password
          JWT_SECRET: test-secret-key-for-ci-only-not-production

      - name: Build JAR
        run: mvn package -DskipTests -B
        working-directory: campus-server
